<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>awscope</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 20px; letter-spacing: 1px; }
    header .meta { font-size: 12px; color: #a0aec0; }
    .btn { background: #4299e1; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #3182ce; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-green { background: #48bb78; }
    .btn-green:hover { background: #38a169; }
    .btn-red { background: #fc8181; color: #1a1a2e; }

    /* Layout */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    aside { width: 240px; background: #fff; border-right: 1px solid #e2e8f0; overflow-y: auto; flex-shrink: 0; }
    aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #718096; padding: 16px 16px 8px; }
    .group-item { padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; font-size: 13px; }
    .group-item:hover { background: #ebf8ff; }
    .group-item.active { background: #ebf8ff; border-left-color: #4299e1; font-weight: 600; }
    .badge { background: #e2e8f0; color: #4a5568; border-radius: 10px; padding: 2px 8px; font-size: 11px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; padding: 0 24px; }
    .tab { padding: 12px 20px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; color: #718096; }
    .tab.active { color: #4299e1; border-bottom-color: #4299e1; font-weight: 600; }

    /* Main */
    main { flex: 1; overflow-y: auto; padding: 24px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #2d3748; }

    /* Cards */
    .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #2d3748; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-type { font-size: 11px; color: #4299e1; background: #ebf8ff; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
    .card-row { font-size: 12px; color: #718096; margin-top: 4px; display: flex; gap: 8px; }
    .card-row span { color: #4a5568; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-running, .status-active, .status-available, .status-attached { background: #48bb78; }
    .status-stopped, .status-deleted, .status-error { background: #fc8181; }
    .status-pending { background: #f6e05e; }
    .arn { font-size: 10px; color: #a0aec0; word-break: break-all; margin-top: 4px; }
    .tags-row { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-chip { font-size: 10px; background: #f7fafc; border: 1px solid #e2e8f0; padding: 2px 6px; border-radius: 4px; color: #4a5568; }

    /* Accounts table */
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th { background: #f7fafc; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #718096; padding: 10px 16px; text-align: left; }
    td { padding: 10px 16px; font-size: 13px; border-top: 1px solid #f0f2f5; }
    .status-connected { color: #48bb78; font-weight: 600; }
    .status-error-text { color: #fc8181; font-size: 12px; }

    /* Loading */
    .loading { color: #718096; font-size: 14px; padding: 40px; text-align: center; }
    .empty { color: #a0aec0; font-size: 14px; padding: 40px; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>⚡ awscope</h1>
  <div style="display:flex;gap:12px;align-items:center">
    <span class="meta" id="scan-meta">Loading...</span>
    <button class="btn btn-green btn-sm" onclick="downloadExport()">Export to Excel</button>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>Groups</h2>
    <div id="group-list"><div class="loading">Loading...</div></div>
  </aside>

  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('resources',this)">Resources</div>
      <div class="tab" onclick="switchTab('accounts',this)">Accounts</div>
    </div>
    <main id="main-content">
      <div class="loading">Select a group to view resources.</div>
    </main>
  </div>
</div>

<script>
let currentGroup = null;
let currentTab = 'resources';

// ── init ──────────────────────────────────────────────────────────────────
async function init() {
  const [summary, groups] = await Promise.all([
    fetchJSON('/api/summary'),
    fetchJSON('/api/groups'),
  ]);

  if (summary) {
    document.getElementById('scan-meta').textContent =
      `${summary.resource_count} resources · ${summary.group_count} groups · scanned ${fmtDate(summary.scanned_at)}`;
  }

  if (groups) renderGroupList(groups);
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// ── sidebar ───────────────────────────────────────────────────────────────
function renderGroupList(groups) {
  const el = document.getElementById('group-list');
  el.innerHTML = groups.map(g => `
    <div class="group-item ${g.group_name === currentGroup ? 'active' : ''}"
         onclick="selectGroup('${g.group_name}')">
      <span>${g.group_name}</span>
      <span class="badge">${g.resource_count}</span>
    </div>
  `).join('');
}

async function selectGroup(name) {
  currentGroup = name;
  document.querySelectorAll('.group-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('span').textContent === name);
  });
  if (currentTab === 'resources') await loadResources(name);
}

// ── tabs ──────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'accounts') loadAccountsTab();
  else if (currentGroup) loadResources(currentGroup);
  else document.getElementById('main-content').innerHTML = '<div class="loading">Select a group.</div>';
}

// ── resources ─────────────────────────────────────────────────────────────
async function loadResources(groupName) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading...</div>';
  const data = await fetchJSON(`/api/groups/${encodeURIComponent(groupName)}`);
  if (!data) { main.innerHTML = '<div class="empty">Failed to load group.</div>'; return; }

  main.innerHTML = `
    <div class="section-title">${data.group_name} <span style="font-weight:400;font-size:14px;color:#718096">(${data.resources.length} resources)</span></div>
    <div class="resource-grid">${data.resources.map(renderCard).join('')}</div>
  `;
}

function renderCard(r) {
  const statusClass = 'status-' + (r.status || 'active').toLowerCase().replace(/[^a-z]/g,'-');
  const tagsHtml = Object.entries(r.tags || {}).slice(0, 5).map(
    ([k,v]) => `<span class="tag-chip">${esc(k)}=${esc(v)}</span>`
  ).join('');
  return `
    <div class="card">
      <div class="card-title" title="${esc(r.name)}">${esc(r.name)}</div>
      <div class="card-type">${esc(r.resource_type)}</div>
      <div class="card-row"><span><span class="status-dot ${statusClass}"></span>${esc(r.status)}</span> · <span>${esc(r.region)}</span> · <span>${esc(r.account_alias)}</span></div>
      ${r.arn ? `<div class="arn">${esc(r.arn)}</div>` : ''}
      ${tagsHtml ? `<div class="tags-row">${tagsHtml}</div>` : ''}
    </div>
  `;
}

// ── accounts ──────────────────────────────────────────────────────────────
async function loadAccountsTab() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Checking connections...</div>';
  const accounts = await fetchJSON('/api/accounts');
  if (!accounts) { main.innerHTML = '<div class="empty">Failed to load accounts.</div>'; return; }

  main.innerHTML = `
    <div class="section-title">AWS Accounts</div>
    <table>
      <thead><tr><th>Alias</th><th>Auth Type</th><th>Account ID</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${accounts.map(a => `
        <tr>
          <td><strong>${esc(a.alias)}</strong></td>
          <td>${esc(a.auth_type)}</td>
          <td>${esc(a.account_id)}</td>
          <td class="${a.status==='connected'?'status-connected':'status-error-text'}">${esc(a.status)}</td>
          <td>${a.auth_type==='sso'?`<button class="btn btn-sm" onclick="ssoLogin('${esc(a.alias)}')">Re-auth SSO</button>`:''}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

async function ssoLogin(alias) {
  const r = await fetch(`/api/accounts/${encodeURIComponent(alias)}/sso-login`, {method:'POST'});
  const data = await r.json();
  alert(data.status === 'browser_opened'
    ? 'Browser opened for SSO login. Refresh after completing login.'
    : `Error: ${data.detail || data.status}`);
}

// ── export ────────────────────────────────────────────────────────────────
function downloadExport() {
  const a = document.createElement('a');
  a.href = '/api/export';
  a.download = '';
  a.click();
}

// ── utils ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

init();
</script>
</body>
</html>
