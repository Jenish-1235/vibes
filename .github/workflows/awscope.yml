name: awscope

# No paths filter on push — tag releases must run even if the tagged commit
# did not touch awscope/. Pull requests stay scoped to awscope-related paths.
on:
  push:
    branches: [main, project/awscope]
    tags:
      - "awscope-v*"
  pull_request:
    branches: [main]
    paths:
      - "awscope/**"
      - ".github/workflows/awscope.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: awscope-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/awscope

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: awscope

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: awscope/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

  # ── 2. Build Docker image (+ push on tag) ─────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/awscope-v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/awscope-v')
        id: version
        run: echo "tag=${GITHUB_REF_NAME#awscope-}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on tag)
        uses: docker/build-push-action@v5
        with:
          context: awscope
          push: ${{ startsWith(github.ref, 'refs/tags/awscope-v') }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/awscope-v') && format('{0}:{1}', env.IMAGE, steps.version.outputs.tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. GitHub Release ─────────────────────────────────────────────────────
  release:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/awscope-v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#awscope-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: awscope ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Docker image

            ```bash
            # Run the web dashboard (mount your local cache)
            docker run -p 8080:8080 \
              -v ~/.awscope/cache.json:/app/cache.json \
              ghcr.io/${{ github.repository_owner }}/awscope:${{ steps.version.outputs.tag }}
            ```

            ## Full stack (web + MinIO + DynamoDB Local)

            ```bash
            # Clone and start
            git clone https://github.com/${{ github.repository }} && cd vibes/awscope
            docker compose up
            ```

            ## CLI (requires Python 3.12+)

            ```bash
            pip install git+https://github.com/${{ github.repository }}.git#subdirectory=awscope
            awscope --help
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
